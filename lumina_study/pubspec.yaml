name: lumina_study
description: "Lumina Study — AI Study Super App for Students"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Networking
  http: ^1.2.2
  dio: ^5.7.0

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Markdown & Code
  flutter_markdown: ^0.7.4
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # File handling
  file_picker: ^8.1.2
  syncfusion_flutter_pdf: ^27.1.48
  path_provider: ^2.1.4

  # Storage
  shared_preferences: ^2.3.2

  # Utilities
  url_launcher: ^6.3.0
  intl: ^0.19.0
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
